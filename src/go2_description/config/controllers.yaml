controller_manager:
  ros__parameters:

    update_rate: 500

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    effort_controller:
      type: effort_controllers/JointGroupEffortController


effort_controller:
  ros__parameters:

    joints:

      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint

      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint

      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint

      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint

    interface_name: effort