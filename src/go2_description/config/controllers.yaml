controller_manager:
  ros__parameters:

    update_rate: 500

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController


joint_trajectory_controller:
  ros__parameters:

    joints:

      - FL_hip_joint
      - FL_thigh_joint
      - FL_calf_joint

      - FR_hip_joint
      - FR_thigh_joint
      - FR_calf_joint

      - RL_hip_joint
      - RL_thigh_joint
      - RL_calf_joint

      - RR_hip_joint
      - RR_thigh_joint
      - RR_calf_joint

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    open_loop_control: true

    allow_partial_joints_goal: true

    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0